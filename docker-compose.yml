version: "3.9"

services:
  # База данных MySQL 8
  mysql:
    image: mysql:8.0
    container_name: procurement_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: procurement_db
      MYSQL_USER: procurement_user
      MYSQL_PASSWORD: procurement_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Скрипт начальной инициализации БД (charset и collation)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # FastAPI-приложение
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: procurement_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USER: procurement_user
      DB_PASSWORD: procurement_pass
      DB_NAME: procurement_db
      DB_PORT: "3306"
    ports:
      - "8000:8000"
    volumes:
      # Монтируем директорию моделей для персистентности
      - models_data:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  # Хранилище данных MySQL
  mysql_data:
  # Хранилище обученных ML-моделей
  models_data:
